repos:
  cloud_engineering_repo: "https://github.com/GabrielHM98/cloud-engineering.git"
  workdir: "/tmp/platform-workdir"

clouds:
  eks:
    cluster_tf_subdir: "eks/cluster"
    infra_gitops_subdir: "infra-gitops/eks"
    env:
      AWS_REGION: us-east-1

  gke:
    cluster_tf_subdir: "gke/cluster"
    infra_gitops_subdir: "infra-gitops/gke"
    env:
      GOOGLE_PROJECT: your-gcp-project-id
      GOOGLE_REGION: us-central1

  aks:
    cluster_tf_subdir: "aks/cluster"
    infra_gitops_subdir: "infra-gitops/aks"

  aro:
    cluster_tf_subdir: "aro/cluster"
    infra_gitops_subdir: "infra-gitops/aro"