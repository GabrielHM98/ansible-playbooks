# tasks/infra_provision.yaml

- name: Helm uninstall platform components (argocd, ingresscontrollers and observability stack).
  command: >
    helm uninstall {{ item.release }}
    {{ infra_gitops_dir }}/{{ item.name }}
  loop:
    - { name: argocd-bootstrap,        release: argocd }
    - { name: ingresscontroller,       release: ingress-nginx }
    - { name: observability, release: observability }
  environment: "{{ cloud_env }}"