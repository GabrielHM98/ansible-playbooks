- name: Provision cluster + platform infra
  hosts: localhost
  gather_facts: no

  vars_files:
    - ./vars/cloud-providers.yaml

  vars:
    target_cloud: "{{ cloud | default('eks') }}"

  tasks:
    - include_tasks: tasks/validate.yaml
      tags: [always]

    - include_tasks: tasks/checkout_cloud_engineering.yaml
      tags: [always]

    - include_tasks: tasks/terraform_init.yaml
      tags: [cluster]

    - include_tasks: tasks/terraform_apply.yaml
      tags: [cluster]

    - include_tasks: tasks/infra_provision.yaml
      tags: [infra]